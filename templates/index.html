<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT-Like Chatbot</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Link Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="chat-container">
   <header class="chat-header">
    <h1>Chatbot</h1>
    <div class="dropdown">
        <button class="btn btn-primary dropdown-toggle" type="button" id="room-menu" data-bs-toggle="dropdown" aria-expanded="false">
            Room: General
        </button>
        <ul class="dropdown-menu" aria-labelledby="room-menu">
                    <li><a class="dropdown-item room-option" href="#" data-room="general">General</a></li>
                    <li><a class="dropdown-item room-option" href="#" data-room="support">Support</a></li>
                    <li><a class="dropdown-item room-option" href="#" data-room="random">Random</a></li>
                </ul>
            </div>
    </header>
    <main class="chat-body" id="chat-body">
        <!-- Chat messages will appear here -->
    </main>
    <footer class="chat-footer">
        <form id="chat-form" class="d-flex">
            <textarea id="message-input" class="form-control" placeholder="Type your message..." required></textarea>
            <button type="submit" class="btn btn-primary">Send</button>
        </form>
    </footer>
</div>


    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
